name: validate-rigorous-reviewer

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Validate JSON files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          for path in Path(".").rglob("*.json"):
              json.loads(path.read_text(encoding="utf-8"))
              print("OK", path)
          PY
      - name: Compile Python scripts
        run: python -m py_compile rigorous-reviewer/scripts/*.py
      - name: Validate installable skill package
        run: python rigorous-reviewer/scripts/check_installable_skill.py --skill-dir rigorous-reviewer
      - name: Validate version consistency
        run: python rigorous-reviewer/scripts/check_version_consistency.py
      - name: Run bundled regression fixtures
        run: python rigorous-reviewer/scripts/run_regression_fixtures.py
      - name: Validate trigger keyword overlay
        run: python rigorous-reviewer/scripts/apply_trigger_keywords.py --skill-md rigorous-reviewer/SKILL.md --check
      - name: Validate Markdown review fixtures
        run: |
          python rigorous-reviewer/scripts/validate_review_report.py tests/fixtures/markdown/valid_review.md --strict
          python rigorous-reviewer/scripts/validate_review_report.py rigorous-reviewer/examples/full_review_example.md
      - name: Validate structured JSON fixture
        run: python rigorous-reviewer/scripts/lint_structured_review.py tests/fixtures/json/valid_structured_review.json --strict
      - name: Validate release metadata consistency
        run: python rigorous-reviewer/scripts/check_release_metadata.py
      - name: Validate benchmark definitions
        run: |
          python rigorous-reviewer/scripts/score_benchmark.py --benchmark-root benchmarks/v1.0
          python rigorous-reviewer/scripts/score_benchmark_semantic.py --benchmark-root benchmarks/v1.1-public
      - name: Run unit tests
        run: python -m unittest discover -s tests
